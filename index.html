<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Fraunces">

  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    /* mobile viewport */
    @media (max-width: 37.5rem) {
      body{
        background-color: hsl(30, 38%, 92%)
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        display: flex;
        flex-direction: column;
        width: 90%;
        max-width: 25rem;
        background-color: hsl(0, 0%, 100%);
        border-radius: 10px;
        box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .card-image img {
        width: 100%;
        height: auto;
      }
      .card-content {
        padding: 20px;
      }
      .card-content h1 {
        font-family: 'Montserrat', sans-serif;
        font-weight: 500, 700;
        font-size: 0.875rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: hsl(228, 12%, 48%);
        margin-block-end: 20px;
      }
      .card-content h2 {
        font-family: 'Fraunces', serif;
        font-weight: 500, 700;
        font-size: 1.25rem;
        margin-block-end: 10px;
      }
      .card-content p {
        font-size: 0.875rem;
        color: #3e52a3;
        margin-block-end: 20px;
      }
      .price {
        display: flex;
        font-family: 'Fraunces', serif;
        font-weight: 500, 700;
        align-items: center;
        margin-block-end: 20px;
      }
      .current-price {
        font-size: 1.5rem;
        color: hsl(158, 36%, 37%);
        margin-right: 20px;
      }
      .original-price {
        font-size: 0.875rem;
        color: #3e52a3;
        text-decoration: line-through;
      }
      .add-to-cart {
        display: block;
        width: 100%;
        padding: 15px;
        background-color: hsl(158, 36%, 37%);
        color: hsl(0, 0%, 100%);
        border: none;
        border-radius: 5px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 500, 700;
        font-size: 1rem;
        cursor: pointer;
      }
      .add-to-cart:hover {
        background-color: hsl(158, 36%, 30%);
      }
    }

    /* Desktop viewport */
    @media (min-width: 768px) {
      body{
        background-color: hsl(30, 38%, 92%)
      }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .card {
        display: flex;
        width: 600px;
        background-color: hsl(0, 0%, 100%);
        border-radius: 10px;
        box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .card-image img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
      }
      .card-content {
        padding: 30px;
        width: 50%;
      }
      .card-content h1 {
        font-family: 'Montserrat', sans-serif;
        font-weight: 500, 700;
        font-size: 0.875rem;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: hsl(228, 12%, 48%);
        margin-block-end: 20px;
      }
      .card-content h2 {
        font-family: 'Fraunces', serif;
        font-weight: 500, 700;
        font-size: 1.75rem;
        margin-block-end: 20px;
      }
      .card-content p {
        font-family: 'Montserrat', sans-serif;
        font-size: 1rem;
        color: hsl(228, 12%, 48%);
        margin-block-end: 30px;
      }
      .price {
        display: flex;
        font-family: 'Fraunces', serif;
        font-weight: 500, 700;
        align-items: center;
        margin-block-end: 30px;
      }
      .current-price {
        font-size: 2rem;
        font-weight: 500, 700;
        color: hsl(158, 36%, 37%);
        margin-right: 30px;
      }
      .original-price {
        font-size: 1rem;
        color: #3e52a3;
        text-decoration: line-through;
      }
      .add-to-cart {
        display: block;
        width: 100%;
        padding: 15px;
        background-color: hsl(158, 36%, 37%);
        color: hsl(0, 0%, 100%);
        border: none;
        border-radius: 5px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 500, 700;
        font-size: 1rem;
        cursor: pointer;
      }
      .add-to-cart:hover {
        background-color: hsl(158, 36%, 30%);
      }
    }

  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="card">
        <div class="card-image">
          <img src="./images/image-product-desktop.jpg" alt="Product Image">
        </div>
        <div class="card-content">
          <h1>Perfume</h1>
          <h2>Gabrielle Essence Eau De Parfum</h2>
          <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
          <div class="price">
            <span class="current-price">$149.99</span>
            <span class="original-price">$169.99</span>
          </div>
          <button id="add-to-cart" class="add-to-cart">Add to Cart</button>
        </div>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Capo</a>.
  </footer>
</body>
</html>
